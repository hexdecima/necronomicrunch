<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>The Necronomicrunch - Rounds</title>
    <link rel="icon" type="image/x-icon" href="../assets/oatus_small.png">
    <link href="index.css" rel="stylesheet">
    <script src="../shared/scripts/api.js" type="module" defer></script>
    <script src="index.js" type="module" defer></script>
    <svg width="0" height="0">
      <filter id="pixelate" x="0" y="0">
        <feFlood x="2" y="2" height="2" width="1" />
        <feComposite width="5" height="5" />
        <feTile result="t" />
        <feComposite in="SourceGraphic" in2="t" operator="in" />
        <feMorphology operator="dilate" radius="2" />
      </filter>
    </svg>
  </head>

  <body>
    <header>
      <div id="top">
        Hall of    (WIP)
      </div>
      <h2><a href="https://store.steampowered.com/app/1557740/ROUNDS/" target="_blank">ROUNDS</a></h2>
    </header>

    <div id="loading">
      <img id="loading-img" height="140" width="140"/>
      <p>Loading...</p>
    </div>
    <div id="main">
      <div id="host">
        <div id="label">
          <p>The streamer</p>
          <p>has...</p>
        </div>

        <div id="win">
          <b>WON</b>
          <p id="win-no">X</p>
        </div>
        <div id="loss">
          <b>LOST</b>
          <p id="loss-no">X</p>
        </div>
      </div>

      <div id="chat">
        <p>CHAT SCORES</p>
        <table id="chat-inner"/>
      </div>
    </div>
  </body>
</html>
